<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <title>Contacto - CinePlus</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <!-- Carga la tipografía Montserrat desde Google Fonts -->
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap"
      rel="stylesheet"
    />

    <!-- Carga Bootstrap para los estilos y componentes -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <!-- Carga los estilos personalizados del sitio -->
    <link rel="stylesheet" href="../css/style.css" />
  </head>
  <body>
    <!-- Barra de navegación igual a la del index -->
    <nav class="navbar navbar-expand-lg navbar-dark">
      <div class="container-fluid px-4">
        <a class="navbar-brand" href="../index.html">CinePlus</a>

        <!-- Botón que muestra el menú en pantallas pequeñas -->
        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#navMenu"
          aria-controls="navMenu"
          aria-expanded="false"
          aria-label="Abrir menú"
        >
          <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navMenu">
          <ul class="navbar-nav ms-auto">
            <li class="nav-item">
              <a class="nav-link" href="../index.html">Inicio</a>
            </li>
            <!-- Marca Contacto como página activa -->
            <li class="nav-item">
              <a class="nav-link active" href="contacto.html">Contacto</a>
            </li>
          </ul>
        </div>
      </div>
    </nav>

    <main class="container py-5">
      <div class="row justify-content-center">
        <div class="col-md-7">
          <div class="card shadow">
            <div class="card-body p-4">
              <h2 class="mb-4">Contáctanos</h2>

              <!-- Formulario de contacto con los campos nombre, correo y mensaje -->
              <form id="form-contacto" novalidate>
                <div class="mb-3">
                  <label for="nombre" class="form-label">Nombre</label>
                  <input
                    type="text"
                    class="form-control"
                    id="nombre"
                    required
                  />
                </div>
                <div class="mb-3">
                  <label for="correo" class="form-label"
                    >Correo electrónico</label
                  >
                  <input
                    type="email"
                    class="form-control"
                    id="correo"
                    required
                  />
                </div>
                <div class="mb-3">
                  <label for="mensaje" class="form-label">Mensaje</label>
                  <textarea
                    class="form-control"
                    id="mensaje"
                    rows="4"
                    required
                  ></textarea>
                </div>
                <button type="submit" class="btn btn-primary">Enviar</button>

                <!-- Alerta que aparece cuando el mensaje se envía correctamente -->
                <div id="alerta" class="alert alert-success mt-3 d-none">
                  Mensaje enviado con éxito.
                </div>
              </form>
            </div>
          </div>
        </div>
      </div>
    </main>

    <!-- Pie de página del sitio -->
    <footer class="footer-sitio text-center py-3">
      <small>&copy; 2025 CinePlus. Todos los derechos reservados.</small>
    </footer>

    <!-- Carga la librería jQuery -->
    <script src="https://code.jquery.com/jquery-3.6.4.min.js"></script>
    <!-- Carga Bootstrap JS para el menú hamburguesa en móviles -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script>
      /* Detecta cuando el usuario envía el formulario */
      $("#form-contacto").on("submit", function (e) {
        e.preventDefault();

        /* Verifica que todos los campos estén llenos correctamente */
        if (this.checkValidity()) {
          /* Muestra la alerta de éxito y la oculta después de 3 segundos */
          $("#alerta").removeClass("d-none").hide().fadeIn();
          setTimeout(() => $("#alerta").fadeOut(), 3000);
          this.reset();
        }
      });
    </script>
  </body>
</html>
