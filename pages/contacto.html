<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <title>Contacto - CinePlus</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <!-- Carga la tipografía Montserrat desde Google Fonts -->
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap"
      rel="stylesheet"
    />

    <!-- Carga Bootstrap para los estilos y componentes -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <!-- Carga los estilos personalizados del sitio -->
    <link rel="stylesheet" href="../css/style.css" />
  </head>
  <body>
    <!-- Barra de navegación igual a la del index -->
    <nav class="navbar navbar-expand-lg navbar-dark">
      <div class="container-fluid px-4">
        <a class="navbar-brand" href="../index.html">CinePlus</a>

        <!-- Botón que muestra el menú en pantallas pequeñas -->
        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#navMenu"
          aria-controls="navMenu"
          aria-expanded="false"
          aria-label="Abrir menú"
        >
          <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navMenu">
          <ul class="navbar-nav ms-auto">
            <li class="nav-item">
              <a class="nav-link" href="../index.html">Inicio</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="renta.html">Rentar</a>
            </li>
            <!-- Marca Contacto como página activa -->
            <li class="nav-item">
              <a class="nav-link active" href="contacto.html">Contacto</a>
            </li>
          </ul>
        </div>
      </div>
    </nav>

    <main class="container py-5">
      <div class="row justify-content-center">
        <div class="col-md-7">
          <div class="card shadow">
            <div class="card-body p-4">
              <h2 class="mb-4">Contáctanos</h2>

              <!-- Formulario con validación personalizada en jQuery -->
              <form id="form-contacto" novalidate>
                <!-- Campo de nombre con mensaje de error personalizado -->
                <div class="mb-3">
                  <label for="nomUsuario" class="form-label">Nombre</label>
                  <input
                    type="text"
                    class="form-control"
                    id="nomUsuario"
                    placeholder="Tu nombre completo"
                  />
                  <div class="invalid-feedback" id="error-nombre">
                    El nombre no puede estar vacío.
                  </div>
                </div>

                <!-- Campo de correo con validación de formato -->
                <div class="mb-3">
                  <label for="correoUsuario" class="form-label"
                    >Correo electrónico</label
                  >
                  <input
                    type="email"
                    class="form-control"
                    id="correoUsuario"
                    placeholder="ejemplo@correo.com"
                  />
                  <div class="invalid-feedback" id="error-correo">
                    Ingresa un correo con formato válido.
                  </div>
                </div>

                <!-- Campo de mensaje con contador de caracteres en tiempo real -->
                <div class="mb-4">
                  <label for="textoMensaje" class="form-label">
                    Mensaje
                    <small class="text-muted">(entre 20 y 50 caracteres)</small>
                  </label>
                  <textarea
                    class="form-control"
                    id="textoMensaje"
                    rows="3"
                    placeholder="Escribe tu mensaje aquí..."
                  ></textarea>
                  <div class="d-flex justify-content-between mt-1">
                    <!-- Muestra el error del mensaje con visibilidad controlada -->
                    <div
                      class="invalid-feedback d-block"
                      id="error-mensaje"
                      style="visibility: hidden"
                    >
                      error
                    </div>
                    <!-- Contador que cambia de color según el rango -->
                    <small id="contador" class="text-muted ms-auto"
                      >0 / 50</small
                    >
                  </div>
                </div>

                <button
                  type="submit"
                  class="btn btn-primary w-100 fw-bold py-2"
                >
                  Enviar mensaje
                </button>

                <!-- Alerta que aparece cuando el mensaje se envía correctamente -->
                <div
                  id="alerta-exito"
                  class="alert alert-success mt-3 d-none"
                  role="alert"
                >
                  ¡Mensaje enviado correctamente! Te responderemos pronto.
                </div>
              </form>
            </div>
          </div>
        </div>
      </div>
    </main>

    <!-- Pie de página del sitio -->
    <footer class="footer-sitio text-center py-3">
      <small>&copy; 2026 CinePlus. Todos los derechos reservados.</small>
    </footer>

    <!-- Carga la librería jQuery -->
    <script src="https://code.jquery.com/jquery-3.6.4.min.js"></script>
    <!-- Carga Bootstrap JS para el menú hamburguesa -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script>
      $(document).ready(function () {
        /* Actualiza el contador de caracteres mientras el usuario escribe */
        $("#textoMensaje").on("input", function () {
          let cant = $(this).val().length;
          $("#contador").text(cant + " / 50");

          /* Cambia el color del contador según si está dentro del rango válido */
          if (cant >= 20 && cant <= 50) {
            $("#contador")
              .removeClass("text-danger text-muted")
              .addClass("text-success");
          } else {
            $("#contador")
              .removeClass("text-success text-muted")
              .addClass("text-danger");
          }
        });

        /* Valida todos los campos al enviar el formulario */
        $("#form-contacto").on("submit", function (e) {
          e.preventDefault();
          let valido = true;

          /* Valida que el nombre no esté vacío */
          let nom = $("#nomUsuario").val().trim();
          if (nom === "") {
            $("#nomUsuario").addClass("is-invalid").removeClass("is-valid");
            valido = false;
          } else {
            $("#nomUsuario").removeClass("is-invalid").addClass("is-valid");
          }

          /* Valida el formato del correo con una expresión regular */
          let correo = $("#correoUsuario").val().trim();
          let regexEmail = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
          if (!regexEmail.test(correo)) {
            $("#correoUsuario").addClass("is-invalid").removeClass("is-valid");
            valido = false;
          } else {
            $("#correoUsuario").removeClass("is-invalid").addClass("is-valid");
          }

          /* Valida que el mensaje tenga entre 20 y 50 caracteres exactos */
          let mensaje = $("#textoMensaje").val();
          let longMsg = mensaje.length;

          if (longMsg < 20) {
            $("#textoMensaje").addClass("is-invalid").removeClass("is-valid");
            $("#error-mensaje")
              .text(
                "El mensaje es muy corto. Mínimo 20 caracteres (tienes: " +
                  longMsg +
                  ").",
              )
              .css("visibility", "visible");
            valido = false;
          } else if (longMsg > 50) {
            $("#textoMensaje").addClass("is-invalid").removeClass("is-valid");
            $("#error-mensaje")
              .text(
                "El mensaje es muy largo. Máximo 50 caracteres (tienes: " +
                  longMsg +
                  ").",
              )
              .css("visibility", "visible");
            valido = false;
          } else {
            $("#textoMensaje").removeClass("is-invalid").addClass("is-valid");
            $("#error-mensaje").css("visibility", "hidden");
          }

          if (!valido) return;

          /* Muestra la alerta de éxito y la oculta después de 4 segundos */
          $("#alerta-exito").removeClass("d-none").hide().fadeIn(500);
          setTimeout(function () {
            $("#alerta-exito").fadeOut(500, function () {
              $(this).addClass("d-none");
            });
          }, 4000);

          /* Limpia todos los campos y estilos del formulario */
          $("#form-contacto")[0].reset();
          $("#form-contacto .is-valid").removeClass("is-valid");
          $("#contador")
            .text("0 / 50")
            .removeClass("text-success text-danger")
            .addClass("text-muted");
          $("#error-mensaje").css("visibility", "hidden");
        });
      });
    </script>
  </body>
</html>
